<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>字幕メーカー Ultimate</title>

<!-- Google Fonts -->
<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DotGothic16&family=Mochiy+Pop+One&family=Noto+Sans+JP:wght@400;700&family=Rampart+One&display=swap"
rel="stylesheet">

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
padding:20px;
margin:0;
}

h1{
font-size:32px;
}

canvas{
border:3px solid white;
max-width:95%;
margin-top:20px;
touch-action:none;
background:black;
}

.controls{
margin-top:20px;
}

input,
select,
button{

margin:8px;
padding:10px;
font-size:18px;
border:none;
border-radius:10px;

}

button{
cursor:pointer;
}

label{
display:block;
margin-top:10px;
}

</style>
</head>

<body>

<h1>
字幕メーカー Ultimate
</h1>

<div class="controls">

<input
type="file"
id="fileInput">

<br>

<input
type="text"
id="textInput"
placeholder="字幕を入力">

<br>

<select id="fontSelect">

<option value="'Noto Sans JP', sans-serif">
Noto Sans JP
</option>

<option value="'Mochiy Pop One', sans-serif">
もちポップ
</option>

<option value="'Rampart One', sans-serif">
ランパート
</option>

<option value="'DotGothic16', sans-serif">
ドットゴシック
</option>

<option value="'Bebas Neue', sans-serif">
Bebas Neue
</option>

<option value="Impact, sans-serif">
Impact
</option>

<option value="'Arial Black', sans-serif">
Arial Black
</option>

<option value="'Yu Gothic', sans-serif">
游ゴシック
</option>

<option value="'Meiryo', sans-serif">
メイリオ
</option>

<option value="'MS Gothic', sans-serif">
MSゴシック
</option>

<option value="'MS Mincho', serif">
MS明朝
</option>

</select>

<br>

<label>

文字色

<input
type="color"
id="textColor"
value="#ff0000">

</label>

<label>

縁色

<input
type="color"
id="strokeColor"
value="#000000">

</label>

<label>

文字サイズ

<input
type="range"
id="fontSize"
min="20"
max="200"
value="70">

</label>

<label>

<input
type="checkbox"
id="rainbow">

虹色字幕

</label>

<br>

<button onclick="downloadImage()">

保存

</button>

</div>

<br>

<canvas id="canvas"></canvas>

<script>

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const fileInput =
document.getElementById("fileInput");

const textInput =
document.getElementById("textInput");

const fontSelect =
document.getElementById("fontSelect");

const textColor =
document.getElementById("textColor");

const strokeColor =
document.getElementById("strokeColor");

const fontSize =
document.getElementById("fontSize");

const rainbow =
document.getElementById("rainbow");

let image = null;
let video = null;

let mediaType = "";

let textX = 300;
let textY = 300;

let dragging = false;


// ファイル読み込み
fileInput.addEventListener(
"change",
e=>{

const file =
e.target.files[0];

if(!file) return;

const url =
URL.createObjectURL(file);


// 動画対応
if(file.type.startsWith("video")){

mediaType = "video";

video =
document.createElement("video");

video.src = url;

video.loop = true;
video.muted = true;
video.autoplay = true;

video.onloadeddata = ()=>{

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

video.play();

renderVideo();

};

return;

}


// GIF/画像対応
mediaType = "image";

image = new Image();

image.src = url;

image.onload = ()=>{

canvas.width =
image.width;

canvas.height =
image.height;

renderImage();

};

});


// 動画描画
function renderVideo(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

drawSubtitle();

requestAnimationFrame(
renderVideo
);

}


// 画像/GIF描画
function renderImage(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.drawImage(
image,
0,
0,
canvas.width,
canvas.height
);

drawSubtitle();

requestAnimationFrame(
renderImage
);

}


// 字幕描画
function drawSubtitle(){

const text =
textInput.value;

const font =
fontSelect.value;

const size =
fontSize.value;


// フォント適用
ctx.font =
`bold ${size}px ${font}`;

ctx.textAlign =
"center";

ctx.lineWidth =
size / 8;


// 縁
ctx.strokeStyle =
strokeColor.value;

ctx.strokeText(
text,
textX,
textY
);


// 虹色字幕
if(rainbow.checked){

const gradient =
ctx.createLinearGradient(
textX - 200,
textY,
textX + 200,
textY
);

gradient.addColorStop(
0,
"red"
);

gradient.addColorStop(
0.2,
"orange"
);

gradient.addColorStop(
0.4,
"yellow"
);

gradient.addColorStop(
0.6,
"green"
);

gradient.addColorStop(
0.8,
"blue"
);

gradient.addColorStop(
1,
"purple"
);

ctx.fillStyle =
gradient;

}else{

ctx.fillStyle =
textColor.value;

}


// 本文
ctx.fillText(
text,
textX,
textY
);

}


// ドラッグ移動
function moveText(clientX, clientY){

const rect =
canvas.getBoundingClientRect();

textX =
(clientX - rect.left)
*
(canvas.width / rect.width);

textY =
(clientY - rect.top)
*
(canvas.height / rect.height);

}


// PC
canvas.addEventListener(
"mousedown",
()=> dragging = true
);

canvas.addEventListener(
"mouseup",
()=> dragging = false
);

canvas.addEventListener(
"mousemove",
e=>{

if(!dragging) return;

moveText(
e.clientX,
e.clientY
);

});


// スマホ
canvas.addEventListener(
"touchstart",
()=> dragging = true
);

canvas.addEventListener(
"touchend",
()=> dragging = false
);

canvas.addEventListener(
"touchmove",
e=>{

if(!dragging) return;

const touch =
e.touches[0];

moveText(
touch.clientX,
touch.clientY
);

e.preventDefault();

});


// 保存
function downloadImage(){

const link =
document.createElement("a");

link.download =
"hikamani.png";

link.href =
canvas.toDataURL();

link.click();

}

</script>

</body>
    </html>
