<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>字幕メーカー Ultimate+</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

canvas{
    border:3px solid white;
    max-width:95%;
    margin-top:20px;
    touch-action:none;
}

input,select,button{
    margin:8px;
    padding:10px;
    font-size:18px;
}
</style>
</head>

<body>

<h1>ヒカマニ字幕メーカー Ultimate+</h1>

<input type="file" id="fileInput">

<br>

<input type="text"
id="textInput"
placeholder="字幕を入力">

<select id="fontSelect">

<option value="Impact">Impact</option>

<option value="Arial Black">
Arial Black
</option>

<option value="Comic Sans MS">
Comic Sans
</option>

<option value="Courier New">
Courier New
</option>

<option value="Georgia">
Georgia
</option>

<option value="Times New Roman">
Times New Roman
</option>

<option value="Verdana">
Verdana
</option>

<option value="Trebuchet MS">
Trebuchet
</option>

<option value="Meiryo">
メイリオ
</option>

<option value="Yu Gothic">
游ゴシック
</option>

<option value="MS Gothic">
MSゴシック
</option>

<option value="MS Mincho">
MS明朝
</option>

</select>

<label>

<input type="checkbox"
id="rainbow">

虹色字幕

</label>

<br>

<button onclick="downloadImage()">
保存
</button>

<br>

<canvas id="canvas"></canvas>

<script>

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const textInput =
document.getElementById("textInput");

const fontSelect =
document.getElementById("fontSelect");

const rainbowCheck =
document.getElementById("rainbow");

const fileInput =
document.getElementById("fileInput");

let mediaType = "";
let image = null;
let video = null;

let textX = 300;
let textY = 300;

let dragging = false;


// ファイル読み込み
fileInput.addEventListener(
"change",
e => {

const file = e.target.files[0];

if(!file) return;

const url =
URL.createObjectURL(file);


// 動画対応
if(file.type.startsWith("video")){

mediaType = "video";

video =
document.createElement("video");

video.src = url;

video.autoplay = true;
video.loop = true;
video.muted = true;

video.onloadeddata = () => {

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

renderVideo();
};

return;
}


// GIF/画像対応
mediaType = "image";

image = new Image();

image.src = url;

image.onload = () => {

canvas.width =
image.width;

canvas.height =
image.height;

renderImage();
};

});


// 動画レンダリング
function renderVideo(){

ctx.clearRect(
0,0,
canvas.width,
canvas.height
);

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

drawSubtitle();

requestAnimationFrame(
renderVideo
);

}


// 画像/GIFレンダリング
function renderImage(){

ctx.clearRect(
0,0,
canvas.width,
canvas.height
);

ctx.drawImage(
image,
0,
0,
canvas.width,
canvas.height
);

drawSubtitle();

requestAnimationFrame(
renderImage
);

}


// 字幕描画
function drawSubtitle(){

const text =
textInput.value;

const font =
fontSelect.value;

ctx.font =
`bold 70px "${font}"`;

ctx.textAlign = "center";

ctx.lineWidth = 10;

ctx.strokeStyle = "black";

ctx.strokeText(
text,
textX,
textY
);


// 虹色字幕
if(rainbowCheck.checked){

const gradient =
ctx.createLinearGradient(
textX-200,
textY,
textX+200,
textY
);

gradient.addColorStop(0,"red");
gradient.addColorStop(0.2,"orange");
gradient.addColorStop(0.4,"yellow");
gradient.addColorStop(0.6,"green");
gradient.addColorStop(0.8,"blue");
gradient.addColorStop(1,"purple");

ctx.fillStyle = gradient;

}else{

ctx.fillStyle = "red";
}

ctx.fillText(
text,
textX,
textY
);

}


// PCドラッグ
canvas.addEventListener(
"mousedown",
() => dragging = true
);

canvas.addEventListener(
"mouseup",
() => dragging = false
);

canvas.addEventListener(
"mousemove",
e => {

if(!dragging) return;

moveText(
e.clientX,
e.clientY
);

});


// スマホ対応
canvas.addEventListener(
"touchstart",
() => dragging = true
);

canvas.addEventListener(
"touchend",
() => dragging = false
);

canvas.addEventListener(
"touchmove",
e => {

if(!dragging) return;

const touch =
e.touches[0];

moveText(
touch.clientX,
touch.clientY
);

e.preventDefault();

});


// 座標移動
function moveText(x,y){

const rect =
canvas.getBoundingClientRect();

textX =
(x - rect.left)
*
(canvas.width / rect.width);

textY =
(y - rect.top)
*
(canvas.height / rect.height);

}


// 保存
function downloadImage(){

const link =
document.createElement("a");

link.download =
"hikamani.png";

link.href =
canvas.toDataURL();

link.click();

}

</script>

</body>
</html>
